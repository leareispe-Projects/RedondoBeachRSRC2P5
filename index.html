<html lang="en">

<meta charset="UTF-8">

<title>Calmex Field Tracker</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f4f1eb;--surface:#fff;--surface2:#f9f7f3;
  --border:#e0dbd2;--border2:#c9c3b8;
  --text:#1a1814;--text2:#6b6560;--text3:#9c9590;
  --accent:#2a5caa;--accent-light:#e8eefc;
  --warn:#b85c00;--danger:#b83232;--danger-light:#fdeaea;
  --success:#1d7a4a;--success-light:#e8f7ef;
  --fund-res:#2a5caa;--fund-em:#7b3fa0;--fund-def:#b85c00;
  --fund-alley:#1d7a4a;--fund-tc:#b83232;
  --font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
  --radius:8px;--header:52px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;display:flex;flex-direction:column;}

.top-bar{height:var(--header);background:var(--text);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:50;}
.top-bar h1{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:#fff;line-height:1.3;}
.save-pill{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.4);transition:all .3s;white-space:nowrap;}
.save-pill.saved{color:#5cd18a;border-color:#5cd18a;}

/* PP strip */
.pp-strip{height:48px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.pp-strip::-webkit-scrollbar{display:none;}
.pp-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);font-family:var(--mono);font-size:11px;color:var(--text2);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .12s;white-space:nowrap;}
.pp-chip .pp-sub{font-size:9px;color:var(--text3);margin-top:1px;}
.pp-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500;}
.pp-chip.active .pp-sub{color:rgba(255,255,255,0.7);}

/* Section strip */
.section-strip{height:40px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;}
.section-chip{padding:4px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;color:var(--text2);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .12s;white-space:nowrap;}
.section-chip.active{background:var(--text);border-color:var(--text);color:#fff;font-weight:500;}

/* Summary cards */
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 12px;flex-shrink:0;}
.s-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;}
.s-card .lbl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:2px;}
.s-card .val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text);}
.s-card.accent .val{color:var(--accent);}
.s-card.success .val{color:var(--success);}
.s-card.warn .val{color:var(--warn);}

/* Item list */
.item-list{flex:1;overflow-y:auto;padding:0 12px 80px;-webkit-overflow-scrolling:touch;}

/* Section header */
.section-header{
  font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;
  letter-spacing:.07em;background:var(--text);color:#fff;
  padding:7px 12px;margin:8px -12px 0;
}

.item-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;transition:border-color .15s;}
.item-card.has-entry{border-color:#b3caed;background:var(--accent-light);}
.item-card.is-done{border-color:#7ccd9e;}
.item-card.is-over{border-color:var(--danger);background:var(--danger-light);}

.item-top{display:flex;align-items:flex-start;gap:8px;padding:10px 12px 6px;}
.item-no{font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 5px;flex-shrink:0;margin-top:2px;}
.item-desc{font-size:12px;line-height:1.4;color:var(--text);flex:1;}
.item-meta{font-family:var(--mono);font-size:10px;color:var(--text3);display:block;margin-top:3px;}

/* Fund tag */
.fund-tag{display:inline-block;font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:3px;margin-top:3px;color:#fff;}
.fund-res{background:var(--fund-res);}
.fund-em{background:var(--fund-em);}
.fund-def{background:var(--fund-def);}
.fund-alley{background:var(--fund-alley);}
.fund-tc{background:var(--fund-tc);}
.fund-split{background:var(--text2);}

.item-input-row{padding:6px 12px 8px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.pp-input-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);flex-shrink:0;}
.pp-big-input{flex:1;height:44px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--mono);font-size:20px;font-weight:500;text-align:center;padding:0 8px;-webkit-appearance:none;appearance:none;transition:border-color .12s,background .12s;}
.pp-big-input:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-light);}
.pp-big-input.filled{background:var(--accent-light);border-color:#7aaee0;}
.pp-big-input.over{background:var(--danger-light);border-color:var(--danger);}
.contract-badge{font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 7px;white-space:nowrap;flex-shrink:0;text-align:center;}

.prog-wrap{height:3px;background:var(--border);margin:0 12px 8px;border-radius:2px;}
.prog-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s;}
.prog-fill.full{background:var(--success);}
.prog-fill.over{background:var(--danger);}

.item-stats{display:flex;border-top:1px solid var(--border);}
.stat-cell{flex:1;padding:6px 8px;text-align:center;border-right:1px solid var(--border);}
.stat-cell:last-child{border-right:none;}
.stat-cell .sl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);display:block;}
.stat-cell .sv{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);display:block;}
.stat-cell .sv.done{color:var(--success);}
.stat-cell .sv.partial{color:var(--warn);}
.stat-cell .sv.over{color:var(--danger);}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:40;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;font-family:var(--font);font-size:10px;color:var(--text3);-webkit-tap-highlight-color:transparent;transition:color .12s;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn.active{color:var(--accent);}
.nav-btn svg{width:22px;height:22px;stroke-width:1.5;fill:none;stroke:currentColor;}

/* Summary page */
.summary-page{flex:1;overflow-y:auto;padding:12px 12px 80px;}
.sum-section-hdr{font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:#fff;background:var(--text);padding:7px 12px;margin:12px -12px 8px;}
.fund-section-hdr{font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:12px 0 6px;}

.sum-fund-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px;}
.sum-fund-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;}
.sum-fund-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--border);font-size:12px;}
.sum-fund-row:last-child{border-bottom:none;}
.sum-fund-row .lbl{color:var(--text2);}
.sum-fund-row .amt{font-family:var(--mono);font-weight:500;}
.sum-fund-row .amt.done{color:var(--success);}
.sum-fund-row .amt.warn{color:var(--warn);}

.pp-summary-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;scrollbar-width:none;}
.pp-summary-row::-webkit-scrollbar{display:none;}
.pp-mini-card{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;min-width:80px;text-align:center;}
.pp-mini-card .pml{font-family:var(--mono);font-size:9px;text-transform:uppercase;color:var(--text3);display:block;}
.pp-mini-card .pmv{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text);display:block;}
.pp-mini-card.has-data{background:var(--accent-light);border-color:#b3caed;}

/* Settings */
.settings-page{flex:1;overflow-y:auto;padding:16px 12px 80px;}
.set-section{margin-bottom:20px;}
.set-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px;}
.set-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.set-row-label{font-size:13px;color:var(--text);}
.set-row-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.set-btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;color:var(--text);-webkit-tap-highlight-color:transparent;}
.set-btn.danger{color:var(--danger);border-color:var(--danger);}
.set-btn.success{color:#fff;background:var(--success);border-color:var(--success);}

.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}
</style>
</head>

const PP_COUNT = 5;
const PP_LABELS = ['PP01','PP02','PP03','PP04','PP05'];
const SECTIONS = ['All','Base Bid','Additive Bid'];
const LS_PREFIX = 'calmex_';

// ── State ─────────────────────────────────────────────────────────────────────
let curPP = 0, curSection = 'All';

// ── Google Drive config ───────────────────────────────────────────────────────
const CLIENT_ID = '457654766599-9ct4lee263lfs3aaham992ntbmikkgmj.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const DATA_FILENAME = 'calmex_tracker_data.json';
let tokenClient, accessToken = null, driveFileId = null;
let appData = {};  // { "B1_pp0": 123, ... }
let driveSaveTimer = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
function initAuth() {
  if (CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID_HERE') {
    document.getElementById('auth-status').textContent = '⚠ No Client ID configured';
    document.getElementById('sign-in-btn').disabled = true; return;
  }
  document.getElementById('auth-status').textContent = 'Ready — tap Sign in to continue';
  gapi.load('client', async () => {
    await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES,
      callback: async (resp) => {
        if (resp.error) { setSavePill('error', 'Auth error'); return; }
        accessToken = resp.access_token;
        gapi.client.setToken({ access_token: accessToken });
        await onSignedIn();
      }
    });
    document.getElementById('sign-in-btn').onclick = () => {
      document.getElementById('auth-status').textContent = 'Signing in…';
      tokenClient.requestAccessToken({ prompt: 'consent' });
    };
  });
}
async function onSignedIn() {
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('sign-out-btn').style.display = 'block';
  setSavePill('saving', 'Loading…');
  await loadFromDrive();
  renderAll();
}
function signOut() {
  google.accounts.oauth2.revoke(accessToken, () => {
    accessToken = null; driveFileId = null; appData = {};
    document.getElementById('auth-overlay').style.display = 'flex';
    document.getElementById('sign-out-btn').style.display = 'none';
    document.getElementById('auth-status').textContent = 'Signed out';
  });
}
async function loadFromDrive() {
  try {
    const res = await gapi.client.drive.files.list({
      q: `name='${DATA_FILENAME}' and trashed=false`, spaces: 'drive', fields: 'files(id,name)'
    });
    const files = res.result.files;
    if (files && files.length > 0) {
      driveFileId = files[0].id;
      const c = await gapi.client.drive.files.get({ fileId: driveFileId, alt: 'media' });
      appData = JSON.parse(c.body) || {};
      setSavePill('saved', 'Loaded ✓');
    } else { appData = {}; setSavePill('saved', 'New file'); }
  } catch(e) { appData = {}; setSavePill('error', 'Load error'); }
}
async function saveToDrive() {
  setSavePill('saving', 'Saving…');
  const blob = new Blob([JSON.stringify(appData)], { type: 'application/json' });
  try {
    if (driveFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
        method: 'PATCH', headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: blob
      });
    } else {
      const meta = JSON.stringify({ name: DATA_FILENAME, mimeType: 'application/json' });
      const form = new FormData();
      form.append('metadata', new Blob([meta], { type: 'application/json' }));
      form.append('file', blob);
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST', headers: { Authorization: `Bearer ${accessToken}` }, body: form
      });
      driveFileId = (await res.json()).id;
    }
    const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    setSavePill('saved', `Saved ${t}`);
  } catch(e) { setSavePill('error', 'Save failed'); }
}
function scheduleSave() { clearTimeout(driveSaveTimer); driveSaveTimer = setTimeout(saveToDrive, 1200); }
function setSavePill(cls, txt) { const el = document.getElementById('save-pill'); el.className = 'save-pill ' + cls; el.textContent = txt; }

// ── Storage ───────────────────────────────────────────────────────────────────
function lsKey(itemId, pp) { return `${itemId}_pp${pp}`; }
function getVal(itemId, pp) { const v = appData[lsKey(itemId, pp)]; return v !== undefined ? v : null; }
function setVal(itemId, pp, v) { const k = lsKey(itemId, pp); if (v === null || v === '' || isNaN(v)) delete appData[k]; else appData[k] = v; }
function getTotalInstalled(itemId) { let t = 0; for (let p = 0; p < PP_COUNT; p++) { const v = getVal(itemId, p); if (v !== null) t += v; } return t; }
function getContractTotal(item) { return item.qty * item.unitCost; }

let saveTimer;
function flashSaved() {
  setSavePill('saving', 'Unsaved…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => scheduleSave(), 100);
}

// ── Fund label HTML ───────────────────────────────────────────────────────────
function fundTag(itemId) {
  const a = ALLOC[itemId] || [1,0,0,0,0];
  const funds = Object.values(FUNDS);
  const active = funds.filter((f,i) => a[i] > 0);
  if (active.length === 0) return '';
  if (active.length === 1) return `<span class="fund-tag ${active[0].cls}">${active[0].short}</span>`;
  return `<span class="fund-tag fund-split">Split: ${active.map(f=>f.short).join(' / ')}</span>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll() { renderPPStrip(); renderSectionStrip(); renderItems(); }

function renderPPStrip() {
  document.getElementById('pp-strip').innerHTML = PP_LABELS.map((lbl, i) => {
    let total = 0;
    BID_ITEMS.forEach(item => { const v = getVal(item.id, i); if (v !== null) total += v * item.unitCost; });
    return `<button class="pp-chip${i===curPP?' active':''}" onclick="selectPP(${i})">
      ${lbl}<span class="pp-sub">${total > 0 ? '$'+Math.round(total).toLocaleString() : 'No entries'}</span>
    </button>`;
  }).join('');
}

function renderSectionStrip() {
  document.getElementById('section-strip').innerHTML = SECTIONS.map(s =>
    `<button class="section-chip${s===curSection?' active':''}" onclick="selectSection('${s}')">${s}</button>`
  ).join('');
}

function renderSummaryCards() {
  const filtered = BID_ITEMS.filter(i => curSection === 'All' || i.sec === curSection);
  let withEntry = 0, ppTotal = 0, contractTotal = 0;
  filtered.forEach(item => {
    const v = getVal(item.id, curPP);
    if (v !== null) { withEntry++; ppTotal += v * item.unitCost; }
    contractTotal += getContractTotal(item);
  });
  const totalInstalled = filtered.reduce((s, item) => s + getTotalInstalled(item.id) * item.unitCost, 0);
  const pct = contractTotal > 0 ? Math.round(totalInstalled / contractTotal * 100) : 0;
  document.getElementById('summary-row').innerHTML = `
    <div class="s-card accent"><div class="lbl">This PP</div><div class="val">$${Math.round(ppTotal).toLocaleString()}</div></div>
    <div class="s-card"><div class="lbl">Items</div><div class="val">${withEntry}/${filtered.length}</div></div>
    <div class="s-card ${pct>=100?'success':pct>50?'warn':'accent'}"><div class="lbl">% Complete</div><div class="val">${pct}%</div></div>`;
}

function renderItems() {
  renderSummaryCards();
  const filtered = BID_ITEMS.filter(i => curSection === 'All' || i.sec === curSection);
  let lastSec = null, html = '';
  filtered.forEach(item => {
    if (curSection === 'All' && item.sec !== lastSec) {
      html += `<div class="section-header">${item.sec}</div>`;
      lastSec = item.sec;
    }
    const ppVal = getVal(item.id, curPP);
    const totalInstalled = getTotalInstalled(item.id);
    const contractAmt = getContractTotal(item);
    const remaining = Math.max(0, item.qty - totalInstalled);
    const over = Math.max(0, totalInstalled - item.qty);
    const pct = item.qty > 0 ? Math.min(100, Math.round(totalInstalled / item.qty * 100)) : 0;
    const isDone = item.qty > 0 && totalInstalled >= item.qty;
    const isOver = over > 0;
    const hasEntry = ppVal !== null;
    const ppAmt = ppVal !== null ? ppVal * item.unitCost : 0;

    html += `<div class="item-card${hasEntry?' has-entry':''}${isDone&&!isOver?' is-done':''}${isOver?' is-over':''}" id="card-${item.id}">
      <div class="item-top">
        <span class="item-no">${item.sec==='Base Bid'?'B':'A'}${item.no}</span>
        <span class="item-desc">${item.desc}
          <span class="item-meta">${item.qty.toLocaleString()} ${item.unit} @ $${item.unitCost} = $${contractAmt.toLocaleString()}</span>
          ${fundTag(item.id)}
        </span>
      </div>
      <div class="item-input-row">
        <span class="pp-input-label">${PP_LABELS[curPP]}</span>
        <input type="number" min="0" inputmode="numeric" class="pp-big-input${hasEntry?' filled':''}${isOver?' over':''}"
          value="${ppVal!==null?ppVal:''}" placeholder="0"
          data-id="${item.id}" oninput="handleInput(this)">
        <span class="contract-badge">/ ${item.qty.toLocaleString()}<br>${item.unit}</span>
      </div>
      ${item.qty>0?`<div class="prog-wrap"><div class="prog-fill${isOver?' over':isDone?' full':''}" id="bar-${item.id}" style="width:${pct}%"></div></div>`:''}
      <div class="item-stats">
        <div class="stat-cell"><span class="sl">PP Amount</span><span class="sv ${hasEntry?'partial':''}" id="ppamt-${item.id}">$${hasEntry?Math.round(ppAmt).toLocaleString():'0'}</span></div>
        <div class="stat-cell"><span class="sl">Total Done</span><span class="sv ${isDone?'done':totalInstalled>0?'partial':''}" id="done-${item.id}">${totalInstalled.toLocaleString()}</span></div>
        <div class="stat-cell"><span class="sl">Remaining</span><span class="sv ${isOver?'over':''}" id="rem-${item.id}">${isOver?'OVER +'+over.toLocaleString():remaining>0?remaining.toLocaleString():item.qty===0?'—':'✓'}</span></div>
      </div>
    </div>`;
  });
  document.getElementById('item-list').innerHTML = html;
}

    BID_ITEMS.forEach(item => {
      const alloc = ALLOC[item.id] || [1,0,0,0,0];
      const contractAmt = getContractTotal(item);
      fundContract += contractAmt * alloc[fi];
      const totalInst = getTotalInstalled(item.id);
      fundPaid += totalInst * item.unitCost * alloc[fi];
    });
    const pct = fundContract > 0 ? Math.round(fundPaid / fundContract * 100) : 0;
    fundHtml += `<div class="sum-fund-card">
      <div class="sum-fund-name"><span class="fund-tag ${fund.cls}" style="margin-right:6px;">&nbsp;</span>${fund.name}</div>
      <div class="sum-fund-row"><span class="lbl">Contract Allocation</span><span class="amt">$${Math.round(fundContract).toLocaleString()}</span></div>
      <div class="sum-fund-row"><span class="lbl">Paid to Date</span><span class="amt ${pct>=100?'done':pct>0?'warn':''}">$${Math.round(fundPaid).toLocaleString()}</span></div>
      <div class="sum-fund-row"><span class="lbl">Remaining</span><span class="amt">$${Math.round(fundContract-fundPaid).toLocaleString()}</span></div>
      <div class="sum-fund-row"><span class="lbl">% Complete</span><span class="amt ${pct>=100?'done':''}">${pct}%</span></div>
    </div>`;
  });

  document.getElementById('summary-page').innerHTML = ppHtml + fundHtml;
}

function renderSettingsPage() {
  document.getElementById('settings-page').innerHTML = `
    <div class="set-section">
      <div class="set-title">Export</div>
      <div class="set-card">
        <div class="set-row">
          <div><div class="set-row-label">Export to Excel</div><div class="set-row-sub">Progress payment forms with funding breakdown by fund</div></div>
          <button class="set-btn success" onclick="exportXLSX()">↓ Excel</button>
        </div>
        <div class="set-row">
          <div><div class="set-row-label">Export backup</div><div class="set-row-sub">Save all entries as a JSON backup file</div></div>
          <button class="set-btn" onclick="exportJSON()">Export</button>
        </div>
        <div class="set-row">
          <div><div class="set-row-label">Import backup</div><div class="set-row-sub">Restore from a previously exported backup</div></div>
          <button class="set-btn" onclick="document.getElementById('import-input').click()">Import</button>
          <input type="file" id="import-input" accept=".json" style="display:none" onchange="importJSON(this)">
        </div>
      </div>
    </div>
    <div class="set-section">
      <div class="set-title">Data</div>
      <div class="set-card">
        <div class="set-row">
          <div><div class="set-row-label">Storage</div><div class="set-row-sub">${Object.keys(appData).length} entries saved to Google Drive</div></div>
        </div>
        <div class="set-row">
          <div><div class="set-row-label">Clear all data</div><div class="set-row-sub">Permanently delete all entries</div></div>
          <button class="set-btn danger" onclick="clearAll()">Clear all</button>
        </div>
      </div>
    </div>
    <div class="set-section">
      <div class="set-title">About</div>
      <div class="set-card">
        <div class="set-row">
          <div>
            <div class="set-row-label">Calmex Field Tracker</div>
            <div class="set-row-sub">City of Redondo Beach · Residential Rehabilitation Cycle 2 Phase 5<br>86 bid items · 5 funding sources · 5 PP periods</div>
          </div>
        </div>
      </div>
    </div>`;
}

// ── Interactions ──────────────────────────────────────────────────────────────
function selectPP(i) { curPP = i; renderAll(); }
function selectSection(s) { curSection = s; renderSectionStrip(); renderItems(); }

function handleInput(el) {
  const id = el.dataset.id;
  const val = el.value === '' ? null : parseFloat(el.value);
  setVal(id, curPP, val);
  el.classList.toggle('filled', val !== null && !isNaN(val));

  const item = BID_ITEMS.find(i => i.id === id);
  const totalInstalled = getTotalInstalled(id);
  const remaining = Math.max(0, item.qty - totalInstalled);
  const over = Math.max(0, totalInstalled - item.qty);
  const pct = item.qty > 0 ? Math.min(100, Math.round(totalInstalled / item.qty * 100)) : 0;
  const isDone = item.qty > 0 && totalInstalled >= item.qty;
  const isOver = over > 0;
  const ppAmt = val !== null ? val * item.unitCost : 0;

  el.classList.toggle('over', isOver);
  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.classList.toggle('has-entry', val !== null && !isNaN(val));
    card.classList.toggle('is-done', isDone && !isOver);
    card.classList.toggle('is-over', isOver);
  }
  const bar = document.getElementById(`bar-${id}`);
  if (bar) { bar.style.width = pct+'%'; bar.className = 'prog-fill'+(isOver?' over':isDone?' full':''); }
  const doneEl = document.getElementById(`done-${id}`);
  if (doneEl) { doneEl.textContent = totalInstalled.toLocaleString(); doneEl.className = 'sv'+(isDone?' done':totalInstalled>0?' partial':''); }
  const remEl = document.getElementById(`rem-${id}`);
  if (remEl) { remEl.textContent = isOver?'OVER +'+over.toLocaleString():remaining>0?remaining.toLocaleString():item.qty===0?'—':'✓'; remEl.className = 'sv'+(isOver?' over':''); }
  const ppAmtEl = document.getElementById(`ppamt-${id}`);
  if (ppAmtEl) { ppAmtEl.textContent = '$'+Math.round(ppAmt).toLocaleString(); ppAmtEl.className = 'sv'+(val!==null&&!isNaN(val)?'partial':''); }

  renderSummaryCards();
  renderPPStrip();
  flashSaved();
}

function showScreen(name) {
  ['entry','summary','settings'].forEach(s => {
    document.getElementById('screen-'+s).classList.toggle('active', s===name);
    document.getElementById('nav-'+s).classList.toggle('active', s===name);
  });
  if (name==='summary') renderSummaryPage();
  if (name==='settings') renderSettingsPage();
}

// ── Export JSON backup ────────────────────────────────────────────────────────
function exportJSON() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(appData,null,2)],{type:'application/json'}));
  a.download = `calmex_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importJSON(input) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result); let count=0;
      for (let k in data) { appData[k] = data[k]; count++; }
      saveToDrive();
      alert(`Imported ${count} entries.`); renderAll();
    } catch { alert('Import failed — invalid file.'); }
  };
  reader.readAsText(input.files[0]); input.value='';
}
function clearAll() {
  if (!confirm('Delete ALL tracking data? This cannot be undone.')) return;
  appData = {}; saveToDrive(); renderAll(); renderSettingsPage();
}

// ── Export XLSX ───────────────────────────────────────────────────────────────
function exportXLSX() {
  if (typeof XLSX === 'undefined') { alert('Excel library not loaded — check internet connection.'); return; }
  const wb = XLSX.utils.book_new();
  const fundKeys = Object.keys(FUNDS);
  const fundNames = Object.values(FUNDS).map(f=>f.name);

  // ── Summary sheet ──
  const sumRows = [
    ['Calmex Engineering — Redondo Beach Residential Rehabilitation Cycle 2 Phase 5'],
    ['Progress Payment Summary — Generated: '+new Date().toLocaleDateString()],
    [],
    ['Section','No.','Description','Unit','Contract Qty','Unit Cost','Contract Amount',
     ...PP_LABELS.map(p=>p+' Qty'),
     ...PP_LABELS.map(p=>p+' $'),
     'Total Qty Installed','Total $ Paid','Remaining Qty','Remaining $','% Complete',
     ...fundNames.map(f=>f+' Allocation'),
     ...fundNames.map(f=>f+' Paid'),
    ]
  ];
  BID_ITEMS.forEach(item => {
    const contractAmt = getContractTotal(item);
    const ppQtys = PP_LABELS.map((_,i) => { const v=getVal(item.id,i); return v!==null?v:''; });
    const ppAmts = PP_LABELS.map((_,i) => { const v=getVal(item.id,i); return v!==null?Math.round(v*item.unitCost*100)/100:''; });
    const totalInst = getTotalInstalled(item.id);
    const totalPaid = Math.round(totalInst*item.unitCost*100)/100;
    const remQty = Math.max(0, item.qty - totalInst);
    const remAmt = Math.round(remQty*item.unitCost*100)/100;
    const pct = item.qty>0?Math.round(totalInst/item.qty*100)/100:'';
    const alloc = ALLOC[item.id]||[1,0,0,0,0];
    const fundAllocs = alloc.map(a => Math.round(contractAmt*a*100)/100);
    const fundPaids  = alloc.map(a => Math.round(totalPaid*a*100)/100);
    sumRows.push([item.sec,item.no,item.desc,item.unit,item.qty,item.unitCost,contractAmt,
      ...ppQtys,...ppAmts,totalInst,totalPaid,remQty,remAmt,pct,...fundAllocs,...fundPaids]);
  });
  const sumSheet = XLSX.utils.aoa_to_sheet(sumRows);
  sumSheet['!cols'] = [{wch:12},{wch:5},{wch:55},{wch:6},{wch:12},{wch:10},{wch:14},
    ...PP_LABELS.map(()=>({wch:10})),...PP_LABELS.map(()=>({wch:12})),
    {wch:14},{wch:14},{wch:14},{wch:14},{wch:11},
    ...fundNames.map(()=>({wch:16})),...fundNames.map(()=>({wch:16}))];
  XLSX.utils.book_append_sheet(wb, sumSheet, 'Summary');

  // ── One sheet per PP period ──
  PP_LABELS.forEach((lbl, pi) => {
    const rows = [
      ['City of Redondo Beach'],
      ['Residential Rehabilitation Cycle 2 Phase 5 Project'],
      [`Progress Payment #${pi+1} — ${lbl}`],
      [],
      ['Section','Line Item','Description','Contract Qty','Unit','Unit Cost','Contract Amount',
       'Qty This PP','Amount This PP','Total Qty to Date','Total $ to Date','Remaining Qty',
       ...fundNames]
    ];
    let ppTotal=0, ppTotalAmt=0;
    BID_ITEMS.forEach(item => {
      const contractAmt = getContractTotal(item);
      const v = getVal(item.id, pi);
      const ppQty = v!==null?v:0;
      const ppAmt = Math.round(ppQty*item.unitCost*100)/100;
      ppTotal += ppQty; ppTotalAmt += ppAmt;
      const totalInst = getTotalInstalled(item.id);
      const totalAmt = Math.round(totalInst*item.unitCost*100)/100;
      const remQty = Math.max(0, item.qty - totalInst);
      const alloc = ALLOC[item.id]||[1,0,0,0,0];
      const fundAmts = alloc.map(a => v!==null ? Math.round(ppAmt*a*100)/100 : '');
      rows.push([item.sec,item.no,item.desc,item.qty,item.unit,item.unitCost,contractAmt,
        v!==null?ppQty:'',v!==null?ppAmt:'',totalInst||'',totalAmt||'',remQty||'',...fundAmts]);
    });
    rows.push([]);
    rows.push(['TOTALS','','','','','','',ppTotal,ppTotalAmt,'','','', ...fundNames.map((_,fi)=>{
      let t=0;
      BID_ITEMS.forEach(item=>{const v=getVal(item.id,pi);if(v!==null){const a=(ALLOC[item.id]||[1,0,0,0,0])[fi];t+=Math.round(v*item.unitCost*a*100)/100;}});
      return t||'';
    })]);
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:12},{wch:6},{wch:52},{wch:12},{wch:6},{wch:10},{wch:14},{wch:10},{wch:14},{wch:14},{wch:14},{wch:12},...fundNames.map(()=>({wch:16}))];
    XLSX.utils.book_append_sheet(wb, ws, lbl);
  });

  // ── Funding Summary sheet ──
  const fsRows = [
    ['Funding Source Summary'],
    ['Generated: '+new Date().toLocaleDateString()],
    [],
    ['Funding Source','Contract Allocation',...PP_LABELS.map(p=>p+' Paid'),'Total Paid to Date','Remaining','% Complete']
  ];
  Object.values(FUNDS).forEach((fund,fi)=>{
    const alloc = ALLOC;
    let contractAlloc=0;
    BID_ITEMS.forEach(item=>{ contractAlloc += getContractTotal(item)*(ALLOC[item.id]||[1,0,0,0,0])[fi]; });
    const ppPaids = PP_LABELS.map((_,pi)=>{
      let t=0;
      BID_ITEMS.forEach(item=>{const v=getVal(item.id,pi);if(v!==null)t+=v*item.unitCost*(ALLOC[item.id]||[1,0,0,0,0])[fi];});
      return Math.round(t*100)/100||'';
    });
    const totalPaid = ppPaids.reduce((s,v)=>s+(v||0),0);
    const rem = Math.round((contractAlloc-totalPaid)*100)/100;
    const pct = contractAlloc>0?Math.round(totalPaid/contractAlloc*100)/100:'';
    fsRows.push([fund.name, Math.round(contractAlloc*100)/100, ...ppPaids, Math.round(totalPaid*100)/100, rem, pct]);
  });
  const fsSheet = XLSX.utils.aoa_to_sheet(fsRows);
  fsSheet['!cols']=[{wch:40},{wch:16},...PP_LABELS.map(()=>({wch:14})),{wch:16},{wch:14},{wch:11}];
  XLSX.utils.book_append_sheet(wb, fsSheet, 'Funding Summary');

  XLSX.writeFile(wb, `Calmex_PP_Export_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.onload = () => {
  const check = setInterval(() => {
    if (typeof google !== 'undefined' && google.accounts && typeof gapi !== 'undefined') {
      clearInterval(check); initAuth();
    }
  }, 200);
  setTimeout(() => {
    clearInterval(check);
    const status = document.getElementById('auth-status');
    if (status && status.textContent === 'Loading...') {
      status.textContent = 'Failed to load Google auth — check internet connection and refresh';
    }
  }, 10000);
};
